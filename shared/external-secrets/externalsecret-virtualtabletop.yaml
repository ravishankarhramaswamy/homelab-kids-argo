apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: virtualtabletop-oauth2-proxy
  namespace: games-virtualtabletop
  labels:
    app.kubernetes.io/part-of: kids-games
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/name: virtualtabletop
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-homelab
    kind: ClusterSecretStore
  target:
    name: virtualtabletop-oauth2-proxy
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: kids-games
          app.kubernetes.io/managed-by: argocd
          app.kubernetes.io/name: virtualtabletop
      type: Opaque
  data:
    - secretKey: client-secret
      remoteRef:
        key: homelab/kids-games/virtualtabletop-oauth2-proxy
        property: client-secret
    - secretKey: cookie-secret
      remoteRef:
        key: homelab/kids-games/virtualtabletop-oauth2-proxy
        property: cookie-secret
