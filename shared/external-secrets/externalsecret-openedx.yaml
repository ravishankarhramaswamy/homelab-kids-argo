apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openedx-secrets
  namespace: games-openedx
  labels:
    app.kubernetes.io/part-of: kids-games
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/name: openedx
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-homelab
    kind: ClusterSecretStore
  target:
    name: openedx-secrets
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: kids-games
          app.kubernetes.io/managed-by: argocd
          app.kubernetes.io/name: openedx
      type: Opaque
  data:
    - secretKey: OPENEDX_SUPERUSER_PASSWORD
      remoteRef:
        key: homelab/kids-games/openedx-secrets
        property: OPENEDX_SUPERUSER_PASSWORD
    - secretKey: MYSQL_ROOT_PASSWORD
      remoteRef:
        key: homelab/kids-games/openedx-secrets
        property: MYSQL_ROOT_PASSWORD
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: homelab/kids-games/openedx-secrets
        property: SMTP_PASSWORD
