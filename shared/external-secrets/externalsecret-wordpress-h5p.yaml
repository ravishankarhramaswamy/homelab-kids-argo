apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wordpress-mariadb
  namespace: games-wordpress-h5p
  labels:
    app.kubernetes.io/part-of: kids-games
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/name: wordpress-h5p
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-homelab
    kind: ClusterSecretStore
  target:
    name: wordpress-mariadb
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: kids-games
          app.kubernetes.io/managed-by: argocd
          app.kubernetes.io/name: wordpress-h5p
      type: Opaque
  data:
    - secretKey: mariadb-root-password
      remoteRef:
        key: homelab/kids-games/wordpress-mariadb
        property: mariadb-root-password
    - secretKey: mariadb-password
      remoteRef:
        key: homelab/kids-games/wordpress-mariadb
        property: mariadb-password
