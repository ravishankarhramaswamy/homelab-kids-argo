apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: moodle-secrets
  namespace: games-moodle
  labels:
    app.kubernetes.io/part-of: kids-games
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/name: moodle
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-homelab
    kind: ClusterSecretStore
  target:
    name: moodle-secrets
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: kids-games
          app.kubernetes.io/managed-by: argocd
          app.kubernetes.io/name: moodle
      type: Opaque
  data:
    - secretKey: moodle-password
      remoteRef:
        key: homelab/kids-games/moodle-secrets
        property: moodle-password
    - secretKey: smtp-password
      remoteRef:
        key: homelab/kids-games/moodle-secrets
        property: smtp-password
---
