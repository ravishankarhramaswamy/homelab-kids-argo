apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kolibri-oidc
  namespace: games-kolibri
  labels:
    app.kubernetes.io/part-of: kids-games
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/name: kolibri
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-homelab
    kind: ClusterSecretStore
  target:
    name: kolibri-oidc
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: kids-games
          app.kubernetes.io/managed-by: argocd
          app.kubernetes.io/name: kolibri
      type: Opaque
  data:
    - secretKey: client-secret
      remoteRef:
        key: homelab/kids-games/kolibri-oidc
        property: client-secret
