{{- if .Values.mariadb.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "wordpress-h5p.fullname" . }}-mariadb
  labels:
    {{- include "wordpress-h5p.labels" . | nindent 4 }}
    app.kubernetes.io/component: mariadb
spec:
  serviceName: {{ include "wordpress-h5p.fullname" . }}-mariadb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: mariadb
      {{- include "wordpress-h5p.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: mariadb
        {{- include "wordpress-h5p.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/part-of: kids-games
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/name: wordpress-h5p
    spec:
      containers:
        - name: mariadb
          image: "{{ .Values.mariadb.image.repository }}:{{ .Values.mariadb.image.tag }}"
          imagePullPolicy: {{ .Values.mariadb.image.pullPolicy }}
          ports:
            - name: mysql
              containerPort: 3306
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wordpress-mariadb
                  key: mariadb-root-password
            - name: MARIADB_DATABASE
              value: {{ .Values.db.name | quote }}
            - name: MARIADB_USER
              value: {{ .Values.db.user | quote }}
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wordpress-mariadb
                  key: mariadb-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "wordpress-h5p.labels" . | nindent 10 }}
          app.kubernetes.io/component: mariadb
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.mariadb.persistence.size }}
        {{- if .Values.mariadb.persistence.storageClass }}
        storageClassName: {{ .Values.mariadb.persistence.storageClass }}
        {{- end }}
{{- end }}
