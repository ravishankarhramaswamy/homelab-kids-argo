{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: virtualtabletop
  labels:
    {{- include "virtualtabletop.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: {{ .Values.gateway.sectionName }}
  hostnames:
    - {{ .Values.gateway.host }}
  rules:
    {{- if .Values.oauth2Proxy.enabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /oauth2
      backendRefs:
        - name: {{ include "virtualtabletop.fullname" . }}-oauth2-proxy
          port: {{ .Values.oauth2Proxy.port }}
    {{- end }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Values.gateway.serviceName }}
          port: {{ .Values.gateway.servicePort }}
{{- end }}
