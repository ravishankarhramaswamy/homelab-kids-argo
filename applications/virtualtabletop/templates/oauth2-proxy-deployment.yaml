{{- if .Values.oauth2Proxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "virtualtabletop.fullname" . }}-oauth2-proxy
  labels:
    {{- include "virtualtabletop.labels" . | nindent 4 }}
    app.kubernetes.io/component: oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "virtualtabletop.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: oauth2-proxy
  template:
    metadata:
      labels:
        {{- include "virtualtabletop.labels" . | nindent 8 }}
        app.kubernetes.io/component: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: "{{ .Values.oauth2Proxy.image.repository }}:{{ .Values.oauth2Proxy.image.tag }}"
          imagePullPolicy: {{ .Values.oauth2Proxy.image.pullPolicy }}
          args:
            - --provider=$(OAUTH2_PROXY_PROVIDER)
            - --oidc-issuer-url=$(OAUTH2_PROXY_OIDC_ISSUER_URL)
            - --client-id=$(OAUTH2_PROXY_CLIENT_ID)
            - --client-secret=$(OAUTH2_PROXY_CLIENT_SECRET)
            - --cookie-secret=$(OAUTH2_PROXY_COOKIE_SECRET)
            - --redirect-url=$(OAUTH2_PROXY_REDIRECT_URL)
            - --upstream=$(OAUTH2_PROXY_UPSTREAMS)
            - --http-address=$(OAUTH2_PROXY_HTTP_ADDRESS)
            - --cookie-domain=$(OAUTH2_PROXY_COOKIE_DOMAIN)
            - --cookie-secure=$(OAUTH2_PROXY_COOKIE_SECURE)
            - --email-domain=$(OAUTH2_PROXY_EMAIL_DOMAINS)
            - --skip-provider-button=true
            - --set-authorization-header=true
            - --pass-authorization-header=true
            - --set-xauthrequest=true
            {{- range .Values.oauth2Proxy.oidc.allowedGroups }}
            - --allowed-group={{ . }}
            {{- end }}
            {{- range .Values.oauth2Proxy.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "virtualtabletop.fullname" . }}-oauth2-proxy
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oauth2Proxy.oidc.existingSecret }}
                  key: {{ .Values.oauth2Proxy.oidc.clientSecretKey }}
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oauth2Proxy.oidc.existingSecret }}
                  key: {{ .Values.oauth2Proxy.oidc.cookieSecretKey }}
          ports:
            - name: http
              containerPort: {{ .Values.oauth2Proxy.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.oauth2Proxy.resources | nindent 12 }}
{{- end }}
