apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kids-games-apps
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: kids-games
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/name: kids-games-apps
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/ravishankarhramaswamy/homelab-kids-argo.git
        revision: HEAD
        directories:
          - path: applications/*
  template:
    metadata:
      name: kids-games-{{path.basename}}
      labels:
        app.kubernetes.io/part-of: kids-games
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/name: "{{path.basename}}"
    spec:
      project: kids-games
      source:
        repoURL: https://github.com/ravishankarhramaswamy/homelab-kids-argo.git
        targetRevision: HEAD
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "games-{{path.basename}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
