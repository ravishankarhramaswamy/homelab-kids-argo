apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kids-games-external-secrets
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: kids-games
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/name: external-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: kids-games
  source:
    repoURL: https://github.com/ravishankarhramaswamy/homelab-kids-argo.git
    targetRevision: HEAD
    path: shared/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
