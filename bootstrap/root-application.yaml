apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kids-games-root
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: kids-games
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/name: kids-games-root
spec:
  project: default
  source:
    repoURL: https://github.com/ravishankarhramaswamy/homelab-kids-argo.git
    targetRevision: HEAD
    path: bootstrap
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
