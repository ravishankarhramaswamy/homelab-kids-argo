apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kolibri.fullname" . }}-config
  labels:
    {{- include "kolibri.labels" . | nindent 4 }}
data:
  KOLIBRI_PORT: "{{ .Values.service.port }}"
  KOLIBRI_HOME: "{{ .Values.persistence.mountPath }}"
  KOLIBRI_RUN_MIGRATIONS: "{{ .Values.kolibri.runMigrations }}"
  {{- if .Values.oidc.enabled }}
  KOLIBRI_OIDC_ENABLED: "true"
  KOLIBRI_OIDC_ISSUER_URL: "{{ .Values.oidc.issuerURL }}"
  KOLIBRI_OIDC_CLIENT_ID: "{{ .Values.oidc.clientID }}"
  KOLIBRI_OIDC_REDIRECT_URL: "{{ .Values.oidc.redirectURL }}"
  KOLIBRI_OIDC_SCOPES: "{{ .Values.oidc.scopes }}"
  KOLIBRI_OIDC_ALLOWED_GROUPS: "{{ .Values.oidc.allowedGroups }}"
  {{- else }}
  KOLIBRI_OIDC_ENABLED: "false"
  {{- end }}
